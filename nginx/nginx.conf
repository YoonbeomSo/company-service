# === 요청 속도 제한 (기존) ===
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/s;

# === 동시 연결 수 제한 (신규) ===
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_conn_zone $server_name zone=conn_total:10m;

server {
    listen 80;

    # --- 보안 헤더 ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    server_tokens off;

    # --- 연결 타임아웃 (slowloris 방어) ---
    keepalive_timeout 15;
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;

    # --- 요청 크기 제한 ---
    client_max_body_size 1m;

    # --- 전체 동시 연결 200개 ---
    limit_conn conn_total 200;
    limit_conn_status 503;

    # 429 응답 커스텀
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<html><body style="font-family:sans-serif;text-align:center;padding:50px"><h2>요청이 너무 많습니다</h2><p>잠시 후 다시 시도해주세요.</p></body></html>';
    }

    # 정적 HTML 파일 서빙 (showme)
    location /inventory-api-spec.html {
        alias /usr/share/nginx/html/showme/inventory-api-spec.html;
    }

    location /fix-stock-bug-plan.html {
        alias /usr/share/nginx/html/showme/fix-stock-bug-plan.html;
    }

    # 로그인 — 엄격한 제한
    location /login {
        limit_conn conn_per_ip 5;
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 나머지 전부 — 일반 제한
    location / {
        limit_conn conn_per_ip 10;
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
