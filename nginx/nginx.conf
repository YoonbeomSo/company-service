# IP당 초당 10요청 허용, 버스트 20까지 대기열
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# 로그인은 더 엄격하게 (IP당 초당 3요청)
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/s;

server {
    listen 80;

    # 429 응답 커스텀
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<html><body style="font-family:sans-serif;text-align:center;padding:50px"><h2>요청이 너무 많습니다</h2><p>잠시 후 다시 시도해주세요.</p></body></html>';
    }

    # 기존 HTML 파일 → 8090
    location /inventory-api-spec.html {
        proxy_pass http://host.docker.internal:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 로그인 — 엄격한 제한
    location /login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 나머지 전부 — 일반 제한
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
