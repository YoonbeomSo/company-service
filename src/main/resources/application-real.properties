# Real MySQL (Docker 내부 네트워크)
spring.datasource.url=jdbc:mysql://host.docker.internal:3307/company_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Thymeleaf - 운영 시 캐시 활성화
spring.thymeleaf.cache=true

# SQL 로그 비활성화
spring.jpa.show-sql=false
