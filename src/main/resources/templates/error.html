<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 - 개발실 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3182f6',
                        'primary-hover': '#1b64da',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="max-w-md w-full px-6">
    <div class="bg-white rounded-2xl p-8 border border-gray-200 text-center">
        <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
        </div>

        <h2 class="text-lg font-bold text-gray-900 mb-2">오류가 발생했습니다</h2>

        <p th:if="${errorMessage}" th:text="${errorMessage}"
           class="text-sm text-gray-600 mb-6"></p>
        <p th:unless="${errorMessage}"
           class="text-sm text-gray-600 mb-6">요청을 처리하는 중 문제가 발생했습니다.</p>

        <a href="javascript:history.back()"
           class="inline-block w-full py-2.5 bg-primary hover:bg-primary-hover text-white text-sm
                  font-semibold rounded-xl transition-colors">
            돌아가기
        </a>
    </div>
</div>

</body>
</html>
