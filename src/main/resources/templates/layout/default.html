<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- 공통 head -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 개발실 서비스'">개발실 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3182f6',
                        'primary-hover': '#1b64da',
                        'gray-50': '#f9fafb',
                        'gray-100': '#f2f4f6',
                        'gray-200': '#e5e8eb',
                        'gray-300': '#d1d6db',
                        'gray-400': '#b0b8c1',
                        'gray-500': '#8b95a1',
                        'gray-600': '#6b7684',
                        'gray-700': '#4e5968',
                        'gray-800': '#333d4b',
                        'gray-900': '#191f28',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</th:block>

<!-- 헤더 + 탭 -->
<th:block th:fragment="header">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-lg font-bold text-gray-900">개발실 서비스</h1>
            <div class="flex items-center gap-3" th:if="${session != null and session.containsKey('memberName')}">
                <span class="text-sm text-gray-600" th:text="${session.memberName}"></span>
                <form method="post" action="/logout">
                    <button type="submit"
                            class="text-sm text-gray-500 hover:text-gray-700 transition-colors">
                        로그아웃
                    </button>
                </form>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b border-gray-200" th:if="${session != null and session.containsKey('memberName')}">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex gap-0">
                <a href="/restaurants"
                   class="px-4 py-3 text-sm font-medium border-b-2 transition-colors"
                   th:classappend="${activeTab == 'restaurants'} ? 'text-primary border-primary' : 'text-gray-500 border-transparent hover:text-gray-700'">
                    후보지
                </a>
                <a href="/votes"
                   class="px-4 py-3 text-sm font-medium border-b-2 transition-colors"
                   th:classappend="${activeTab == 'votes'} ? 'text-primary border-primary' : 'text-gray-500 border-transparent hover:text-gray-700'">
                    투표
                </a>
            </div>
        </div>
    </nav>
</th:block>

</html>
