<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="restaurant-list">
    <div th:if="${#lists.isEmpty(restaurants)}" class="text-center py-12">
        <p class="text-gray-400 text-sm">등록된 후보지가 없습니다</p>
    </div>

    <div class="space-y-3" th:unless="${#lists.isEmpty(restaurants)}">
        <div th:each="restaurant : ${restaurants}"
             class="bg-white rounded-2xl p-4 border border-gray-200 hover:border-gray-300 transition-colors">
            <div class="flex items-start justify-between">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-semibold text-gray-900 text-sm" th:text="${restaurant.name}"></span>
                        <span class="px-2 py-0.5 bg-primary/10 text-primary text-xs rounded-full font-medium"
                              th:text="${restaurant.foodType}"></span>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-400">
                        <span th:text="${restaurant.registrant.name}"></span>
                        <span>&middot;</span>
                        <span th:text="${#temporals.format(restaurant.createdAt, 'MM/dd HH:mm')}"></span>
                    </div>
                </div>
                <a th:if="${restaurant.link != null}" th:href="${restaurant.link}" target="_blank"
                   class="text-primary text-xs hover:underline shrink-0 ml-3">
                    링크
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
