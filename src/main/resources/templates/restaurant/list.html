<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/default :: head('후보지')}"></head>
<body class="bg-gray-50 min-h-screen">
<div th:replace="~{layout/default :: header}"></div>

<main class="max-w-4xl mx-auto px-4 py-6">

    <!-- 월 선택기 -->
    <div class="flex items-center justify-center gap-4 mb-6">
        <a th:href="@{/restaurants(yearMonth=${prevYearMonth})}"
           class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
            &lt;
        </a>
        <h2 class="text-lg font-bold text-gray-900" th:text="${yearMonthDisplay}"></h2>
        <a th:href="@{/restaurants(yearMonth=${nextYearMonth})}"
           class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
            &gt;
        </a>
    </div>

    <!-- 후보지 등록 폼 -->
    <div class="bg-white rounded-2xl p-5 mb-6 border border-gray-200">
        <h3 class="text-sm font-semibold text-gray-800 mb-4">후보지 등록</h3>
        <form hx-post="/restaurants" hx-target="#restaurant-list" hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) { this.reset(); } else { alert('후보지 등록에 실패했습니다: ' + (event.detail.xhr.responseText || '서버 오류')); }"
              class="space-y-3">
            <input type="hidden" name="yearMonth" th:value="${yearMonth}">
            <div class="flex gap-3">
                <input type="text" name="name" placeholder="가게이름" required
                       class="flex-1 px-3 py-2.5 bg-gray-50 rounded-xl text-sm text-gray-900
                              placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary transition-all">
                <input type="text" name="foodType" placeholder="음식종류" required
                       class="w-28 px-3 py-2.5 bg-gray-50 rounded-xl text-sm text-gray-900
                              placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary transition-all">
            </div>
            <div class="flex gap-3">
                <input type="url" name="link" placeholder="링크 (선택)"
                       class="flex-1 px-3 py-2.5 bg-gray-50 rounded-xl text-sm text-gray-900
                              placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary transition-all">
                <button type="submit"
                        class="px-5 py-2.5 bg-primary hover:bg-primary-hover text-white text-sm
                               font-semibold rounded-xl transition-colors whitespace-nowrap">
                    등록
                </button>
            </div>
        </form>
    </div>

    <!-- 후보지 목록 -->
    <div id="restaurant-list">
        <div th:replace="~{restaurant/fragments/restaurant-list :: restaurant-list}"></div>
    </div>

</main>
</body>
</html>
