<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="result">
    <!-- 투표 완료자 -->
    <div th:if="${voterNames != null and !voterNames.isEmpty()}" class="mb-5 pb-4 border-b border-gray-100">
        <div class="flex items-center gap-2 mb-2">
            <h4 class="text-sm font-semibold text-gray-700">투표 완료</h4>
            <span class="text-xs text-primary font-medium" th:text="${voterNames.size()} + '명'"></span>
        </div>
        <div class="flex flex-wrap gap-1.5">
            <span th:each="name : ${voterNames}"
                  class="px-2.5 py-1 bg-primary/10 text-primary text-xs font-medium rounded-full"
                  th:text="${name}"></span>
        </div>
    </div>

    <!-- 장소 투표 현황 -->
    <div class="mb-6">
        <h4 class="text-sm font-semibold text-gray-700 mb-3">장소별 득표</h4>
        <div class="space-y-2">
            <div th:each="item : ${vote.voteItems}" class="group relative flex items-center justify-between py-2 cursor-default">
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <span class="text-sm text-gray-900 truncate" th:text="${item.restaurant.name}"></span>
                    <span class="text-xs text-gray-400 shrink-0" th:text="${item.restaurant.foodType}"></span>
                </div>
                <div class="flex items-center gap-2 shrink-0 ml-3">
                    <div class="w-16 bg-gray-100 rounded-full h-1.5">
                        <div class="bg-primary rounded-full h-1.5"
                             th:style="'width: ' + (${item.ballots.size()} > 0 and ${maxBallotCount} > 0 ? ${item.ballots.size() * 100 / maxBallotCount} : 0) + '%'">
                        </div>
                    </div>
                    <span class="text-xs font-medium w-6 text-right"
                          th:classappend="${maxBallotCount > 0 and item.ballots.size() == maxBallotCount} ? 'text-red-500' : 'text-gray-600'"
                          th:text="${item.ballots.size()}"></span>
                </div>
                <!-- 투표자 tooltip -->
                <div th:if="${!item.ballots.isEmpty()}"
                     class="hidden group-hover:block absolute left-0 -bottom-1 translate-y-full z-10
                            bg-gray-900 text-white text-xs rounded-lg px-3 py-2 shadow-lg whitespace-nowrap">
                    <span th:each="ballot, stat : ${item.ballots}"><span th:text="${ballot.voter.name}"></span><span th:unless="${stat.last}">, </span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 날짜 투표 현황 -->
    <div th:if="${!dateSummary.isEmpty()}">
        <h4 class="text-sm font-semibold text-gray-700 mb-3">날짜별 가능 인원</h4>
        <div class="space-y-1">
            <div th:each="entry : ${dateSummary.entrySet()}" class="group relative flex items-center justify-between py-1.5 cursor-default">
                <span class="text-sm text-gray-700" th:text="${#temporals.format(entry.key, 'MM/dd (E)')}"></span>
                <span class="text-sm font-medium text-primary" th:text="${entry.value} + '명'"></span>
                <!-- 날짜별 투표자 tooltip -->
                <div th:if="${dateVoterNames != null and dateVoterNames.containsKey(entry.key)}"
                     class="hidden group-hover:block absolute right-0 -bottom-1 translate-y-full z-10
                            bg-gray-900 text-white text-xs rounded-lg px-3 py-2 shadow-lg whitespace-nowrap">
                    <span th:text="${#strings.listJoin(dateVoterNames.get(entry.key), ', ')}"></span>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${dateSummary.isEmpty() && totalBallotCount == 0}" class="text-center py-4">
        <p class="text-gray-400 text-sm">아직 투표한 사람이 없습니다</p>
    </div>
</div>
</body>
</html>
