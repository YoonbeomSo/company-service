<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 개발실 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3182f6',
                        'primary-hover': '#1b64da',
                        'gray-50': '#f9fafb',
                        'gray-100': '#f2f4f6',
                        'gray-200': '#e5e8eb',
                        'gray-400': '#b0b8c1',
                        'gray-500': '#8b95a1',
                        'gray-600': '#6b7684',
                        'gray-800': '#333d4b',
                        'gray-900': '#191f28',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm px-6">
    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">개발실 서비스</h1>
        <p class="text-sm text-gray-500">이름과 비밀번호를 입력해주세요</p>
    </div>

    <form method="post" action="/login" class="space-y-4">
        <!-- 에러 메시지 -->
        <div th:if="${errorMessage}" class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- 이름 -->
        <div>
            <input type="text" name="name" placeholder="이름"
                   th:value="${name}"
                   required maxlength="50"
                   class="w-full px-4 py-3.5 bg-gray-100 rounded-xl text-gray-900 text-sm
                          placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary
                          transition-all">
        </div>

        <!-- 비밀번호 -->
        <div>
            <input type="password" name="password" placeholder="비밀번호 (숫자 4자리)"
                   required pattern="[0-9]{4}" maxlength="4" inputmode="numeric"
                   class="w-full px-4 py-3.5 bg-gray-100 rounded-xl text-gray-900 text-sm
                          placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary
                          transition-all">
        </div>

        <!-- 시작하기 버튼 -->
        <button type="submit"
                class="w-full py-3.5 bg-primary hover:bg-primary-hover text-white text-sm
                       font-semibold rounded-xl transition-colors mt-2">
            시작하기
        </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
        처음이시면 자동으로 계정이 생성됩니다
    </p>
</div>

</body>
</html>
