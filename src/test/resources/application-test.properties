spring.application.name=company-service-test

# 실행중인 MySQL 컨테이너 사용 (3307 포트)
spring.datasource.url=jdbc:mysql://localhost:3307/company_service_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - 테스트에서는 create-drop으로 스키마 자동 관리
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
